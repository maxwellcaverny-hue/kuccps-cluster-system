<h2>All Cluster Points</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Cluster</th>
        <th>Points</th>
        <th>Select Course</th>
    </tr>

    {% for c, p in results.items() %}
    <tr>
        <td>{{ c }}</td>
        <td>{{ p }}</td>
        <td>
            <form method="GET" action="/check-course">
                <input type="hidden" name="cluster" value="{{ c }}">
                <input type="hidden" name="points" value="{{ p }}">

                <select name="course_name" required>
                    <option value="">Select Course</option>
                    {% for course in cluster_courses.get(c, []) %}
                        <option value="{{ course.name }}">{{ course.name }}</option>
                    {% endfor %}
                </select>

                <button type="submit">Go</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="/results">Back</a>
